services:
  api:
    build: .
    container_name: property-rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: property-rag-streamlit
    ports:
      - "8501:8501"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy